name: Daily Product Digest

"on":
  schedule:
    - cron: "25 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run digest without sending messages"
        required: false
        type: boolean
        default: false

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: pytest -v

      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if ${{ github.event.inputs.dry_run == true || github.event.inputs.dry_run == 'true' }}; then
            python -m proradaar.digest --dry-run
          else
            python -m proradaar.digest
          fi
